<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found | Hira Sparkles Hub</title>
    <meta name="description" content="The page could not be found. Return to Hira Sparkles Hub." />
    <script>
      (function () {
        var base = "/hira-sparkles-hub/";
        var path = window.location.pathname;
        if (!path.startsWith(base)) return;

        var target = base + "?redirect=" + encodeURIComponent(path.slice(base.length) + window.location.search + window.location.hash);
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <main style="min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;text-align:center;color:#111827;background:#fafafa;">
      <section>
        <h1 style="font-size:32px;margin:0 0 8px;">Page not found</h1>
        <p style="margin:0 0 20px;color:#4b5563;">The page you requested could not be found.</p>
        <a href="/hira-sparkles-hub/" style="display:inline-block;border:1px solid #111827;border-radius:6px;padding:10px 16px;color:#111827;text-decoration:none;">Go home</a>
      </section>
    </main>
  </body>
</html>
