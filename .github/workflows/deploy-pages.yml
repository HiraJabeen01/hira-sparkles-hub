name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          DEPLOY_TARGET: github-pages
        run: bun run build

      # GitHub Pages needs a 404.html that mirrors index.html so client-side
      # routes (e.g. /some-page) resolve correctly on refresh / deep links.
      - name: Add SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      # Prevents GitHub Pages from running Jekyll on the output,
      # which would strip files/folders beginning with an underscore.
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
