name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build
        run: bun run build
        env:
          DEPLOY_TARGET: github-pages

      - name: Show output
        run: |
          pwd
          ls -la
          echo "-------------"
          find . -maxdepth 4 -type d
